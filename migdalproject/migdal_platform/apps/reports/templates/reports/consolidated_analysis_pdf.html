<!DOCTYPE html>
<html>
<head>
    <style>
        @page {
            size: letter portrait;
            margin: 2cm;
        }
        body {
            font-family: Helvetica, sans-serif;
            color: #333;
        }
        h1 {
            color: #1e3a8a;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }
        .meta-info {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 20px;
        }
        .ai-content {
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    {% for report in reports %}
        <div>
            <h1>Migdal AI Analysis: {{ report.source.name }}</h1>
            
            <div class="meta-info">
                <strong>Device Type:</strong> {{ report.source.device_type|title }}<br>
                <strong>Report ID:</strong> {{ report.id }}<br>
                <strong>Generated At:</strong> {{ generated_at }}
            </div>
            
            <div class="ai-content">
                {{ report.content|linebreaks }}
            </div>
        </div>

        {% if not forloop.last %}
            <pdf:nextpage /> 
        {% endif %}

    {% endfor %}

</body>
</html>
