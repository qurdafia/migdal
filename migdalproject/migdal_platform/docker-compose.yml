version: '3.8'

services:
  # The Database for your Local Development
  db:
    image: postgres:15-alpine
    container_name: migdal_db_dev
    environment:
      - POSTGRES_DB=migdal_dev
      - POSTGRES_USER=migdal_user
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      # PERSISTENCE: Maps DB data to a folder 'pg_data' on your laptop
      - ./pg_data:/var/lib/postgresql/data

volumes:
  postgres_data: