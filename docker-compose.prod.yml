services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=migdal_prod
      - POSTGRES_USER=migdal_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    env_file:
      - .env.prod
    restart: always

  # THE MESSAGE BROKER (Used by Celery and Channels/WebSockets)
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # THE DJANGO BACKEND
  web:
    build:
      context: ./migdalproject/migdal_platform
      dockerfile: Dockerfile
    # Daphne and migrations are handled inside this script!
    command: /app/entrypoint.sh
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
    restart: always

  # THE BACKGROUND WORKER (Executes the Playbooks)
  celery_worker:
    build:
      context: ./migdalproject/migdal_platform
      dockerfile: Dockerfile
    command: celery -A migdal worker -l info
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
    restart: always

  # THE SCHEDULER (Watches the Cron Strings)
  celery_beat:
    build:
      context: ./migdalproject/migdal_platform
      dockerfile: Dockerfile
    command: celery -A migdal beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
    restart: always

  # THE REACT FRONTEND & REVERSE PROXY
  nginx:
    build:
      context: ./migdalproject/migdal_frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/html/static:ro
      - media_volume:/usr/share/nginx/html/media:ro
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume: